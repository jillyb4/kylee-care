<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kylee · Nursing Dashboard 2026</title>
  <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #F0F4F4; font-family: 'Figtree', 'Segoe UI', sans-serif; }
    button:focus { outline: none; }
    input, select { font-family: inherit; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;

const LOCATIONS = {
  moms:  { label: "Mom's · Ridgefield",   color: "#2D7D6F", light: "#E6F4F1", icon: "🏠" },
  papas: { label: "Papa's · Portland",    color: "#1E5FA8", light: "#E3EEF9", icon: "🏡" },
  cit:   { label: "Intensive · Portland", color: "#8B3A8B", light: "#F4E6F4", icon: "🏥" },
  none:  { label: "—",                    color: "#9CA3AF", light: "#F3F4F6", icon: "" },
};

const STANDARD = {
  1: { loc: "moms",  label: "2:30–10:00 PM" },
  2: { loc: "papas", label: "12:00–9:00 PM" },
  3: { loc: "moms",  label: "2:30–10:00 PM" },
  4: { loc: "moms",  label: "1:00–9:00 PM"  },
  5: { loc: "papas", label: "1:30–8:30 PM"  },
  6: { loc: "papas", label: "9:00 AM–5:00 PM" },
  0: null,
};

const INTENSIVE_BLOCKS = [
  { start: "2026-03-30", end: "2026-04-10" },
  { start: "2026-06-22", end: "2026-07-10" },
  { start: "2026-11-23", end: "2026-11-25" },
  { start: "2026-11-30", end: "2026-12-04" },
];

const SUMMER_BLOCK = { start: "2026-06-25", end: "2026-08-26" };

const ALL_PORTLAND_BLOCKS = [
  { start: "2026-08-02", end: "2026-08-20", note: "Parents out of country" },
];

// Days when Kylee is at Mom's/Ridgefield despite normal schedule saying Portland
const LOCATION_OVERRIDES = {
  "2026-06-13": { loc: "moms", label: "9:00 AM–5:00 PM" }, // Sat — at Ridgefield night before (Alex Warren Jun 12)
  "2026-07-30": { loc: "moms", label: "2:30–10:00 PM" }, // Thu
  "2026-07-31": { loc: "moms", label: "2:30–10:00 PM" }, // Fri
  "2026-08-01": { loc: "moms", label: "9:00 AM–5:00 PM" }, // Sat (no shift – concert)
  "2026-08-21": { loc: "moms", label: "2:30–10:00 PM" }, // Fri
  "2026-08-22": { loc: "moms", label: "9:00 AM–5:00 PM" }, // Sat
  "2026-08-25": { loc: "moms", label: "2:30–10:00 PM" }, // Tue
};

const MEDICAL_APPTS = {
  "2026-03-11": { appt: "Pediatric Echo Lab", apptTime: "10:45 AM", label: "2:30–10:00 PM", location: "OHSU Doernbecher", noEarlyNurse: true },
  "2026-05-15": { appt: "Office Visit",       apptTime: "10:30 AM", label: "9:30 AM–5:30 PM",  location: "OHSU Doernbecher", loc: "moms"   },
  "2026-06-02": { appt: "Neurology/Botox",    apptTime: "2:00 PM",  label: "1:00 PM–9:00 PM",  location: "OHSU Doernbecher"   },
  "2026-06-08": { appt: "Endocrinology",      apptTime: "10:30 AM", label: "9:30 AM–5:30 PM",  location: "Randall Children's" },
  "2026-09-01": { appt: "Office Visit", apptTime: "11:00 AM", label: "10:00 AM–6:00 PM", location: "OHSU Doernbecher", hasTherapy: true },
};

const CANCELLED_NOTES = {
  "2026-03-14": "🎉 Unified Prom",
  "2026-06-12": "🎵 Alex Warren",
  "2026-07-14": "🎵 Hilary Duff",
  "2026-08-01": "🎵 Ed Sheeran",
  "2026-08-31": "🎵 Noah Kahan",
};
const CANCELLED = new Set(Object.keys(CANCELLED_NOTES));

const NO_SCHOOL_SHIFT = [
  // Spring 2026
  "2026-03-27","2026-04-24","2026-05-25","2026-05-29",
  // Fall 2026
  "2026-09-07", // Labor Day
  "2026-10-09", // Cispus Break Day
  "2026-10-12", // Staff PD Day
  "2026-11-11", // Veterans Day
  "2026-11-26", // Thanksgiving
  "2026-11-27", // Fall Break
  "2026-12-07", // Staff PD Day
  // Winter Break Dec 21–31
  "2026-12-21","2026-12-22","2026-12-23","2026-12-24","2026-12-25",
  "2026-12-28","2026-12-29","2026-12-30","2026-12-31",
];

const SEED_CONFIRMED = {
  "2026-03-09": "KC (Avail)",
  "2026-03-11": "MS (Avail)",
  "2026-03-16": "KC (Avail)",
  "2026-03-25": "MS (Avail)",
};

const STORAGE_KEY = "kylee_confirmed_v1";
const MONTHS = ["January","February","March","April","May","June","July","August","September","October","November","December"];
const DAYS = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
const NURSES = ["KC (Avail)","MS (Avail)","AN (TeamSelect)","Other"];

function isoDate(y,m,d){ return `${y}-${String(m+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`; }
function inRange(ds,ranges){ return ranges.some(r=>ds>=r.start&&ds<=r.end); }
function load(){ try{ const r=localStorage.getItem(STORAGE_KEY); if(r) return JSON.parse(r); }catch(e){} return {...SEED_CONFIRMED}; }
function save(o){ try{ localStorage.setItem(STORAGE_KEY,JSON.stringify(o)); }catch(e){} }

function getDayData(y,m,d,confirmed){
  const ds=isoDate(y,m,d);
  const dow=new Date(y,m,d).getDay();
  const std=STANDARD[dow];
  if(!std) return null;
  if(CANCELLED.has(ds)) return {ds,loc:"none",label:"No shift",note:CANCELLED_NOTES[ds],nurse:null,isCancelled:true};

  const isIntensive=inRange(ds,INTENSIVE_BLOCKS);
  const isSummer=ds>=SUMMER_BLOCK.start&&ds<=SUMMER_BLOCK.end;
  const portlandBlock=ALL_PORTLAND_BLOCKS.find(b=>ds>=b.start&&ds<=b.end);
  const med=MEDICAL_APPTS[ds];
  const noSchool=NO_SCHOOL_SHIFT.includes(ds);

  let loc=std.loc, label=std.label, note=null, isMedical=false;

  if(isIntensive && dow!==6){ label="7:30 AM–6:00 PM"; note="🏥 CIT Intensive"; }
  else if(med){
    isMedical=true; label=med.label;
    note=`🔵 ${med.appt} — ${med.apptTime}`;
    if(med.loc) loc=med.loc;
  }
  else if(portlandBlock){ loc="papas"; note=`⚠️ ${portlandBlock.note}`; }
  else if(noSchool){ label="7:30 AM–5:00 PM"; loc="moms"; }
  else if(isSummer){ label= dow===4 ? "7:30 AM–7:00 PM" : "7:30 AM–5:00 PM"; }

  // Apply location override (specific days Kylee is at Mom's despite normal Portland schedule)
  const override=LOCATION_OVERRIDES[ds];
  if(override && !isIntensive && !isMedical){ loc=override.loc; label=override.label; note=null; }

  const isTherapy = !isIntensive && [2,4].includes(dow) && (!isMedical || med?.hasTherapy);
  const therapyTime = dow===2 ? "2–3 PM" : dow===4 ? "2–6 PM" : null;

  return {ds,loc,label,note,nurse:confirmed[ds]||null,isIntensive,isMedical,isTherapy,therapyTime};
}

function buildGrid(y,m){
  const first=new Date(y,m,1).getDay();
  const days=new Date(y,m+1,0).getDate();
  const cells=[];
  for(let i=0;i<first;i++) cells.push(null);
  for(let d=1;d<=days;d++) cells.push(d);
  return cells;
}

function stats(y,m,confirmed){
  const days=new Date(y,m+1,0).getDate();
  let total=0,filled=0,needs=0,cancelled=0;
  for(let d=1;d<=days;d++){
    const data=getDayData(y,m,d,confirmed);
    if(!data) continue;
    if(data.isCancelled){cancelled++;continue;}
    total++;
    if(data.nurse) filled++; else needs++;
  }
  return {total,filled,needs,cancelled};
}

function Pill({label,value,color}){
  return (
    <div style={{background:color+"18",border:`1.5px solid ${color}40`,borderRadius:12,padding:"10px 20px",textAlign:"center",minWidth:100}}>
      <div style={{fontSize:26,fontWeight:800,color,fontFamily:"'DM Mono',monospace"}}>{value}</div>
      <div style={{fontSize:11,color:"#666",fontWeight:600,letterSpacing:"0.05em",textTransform:"uppercase",marginTop:2}}>{label}</div>
    </div>
  );
}

function DayCell({d,y,m,confirmed,selected,onClick}){
  if(!d) return <div style={{minHeight:74}}/>;
  const data=getDayData(y,m,d,confirmed);
  if(!data) return <div style={{minHeight:74,background:"#FAFAFA",borderRadius:10,border:"1.5px solid #F3F4F6"}}/>;

  const loc=LOCATIONS[data.loc];
  const isToday=isoDate(y,m,d)===new Date().toISOString().slice(0,10);
  const {isCancelled,nurse,isMedical,isIntensive}=data;

  const statusColor = isCancelled ? "#E5E7EB" : nurse ? "#059669" : "#F59E0B";
  const locBorder = selected?"#1A7A6E":isToday?"#F59E0B":isCancelled?"#E5E7EB":loc.color+"80";
  // Left stripe = location color so you can instantly see Mom's/Papa's/CIT
  const stripeColor = isCancelled ? "#E5E7EB" : loc.color;
  const bg = isCancelled ? "#F9FAFB" : loc.light;

  return (
    <div onClick={()=>onClick(d)} style={{
      background:bg,
      border:`1.5px solid ${locBorder}`,
      borderLeft:`6px solid ${stripeColor}`,
      borderRadius:10,
      padding:"7px 6px 7px 7px",minHeight:80,cursor:"pointer",
      transition:"all 0.15s",opacity:isCancelled?0.55:1,
      boxShadow:selected?`0 0 0 3px #1A7A6E30`:isToday?`0 0 0 3px #F59E0B30`:"none",
    }}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:2}}>
        <span style={{fontWeight:isToday?800:600,fontSize:12,fontFamily:"'DM Mono',monospace",
          color:isToday?"#D97706":isCancelled?"#9CA3AF":loc.color}}>{d}</span>
        {isCancelled && <span style={{fontSize:8,color:"#9CA3AF",border:"1px solid #E5E7EB",borderRadius:3,padding:"1px 3px"}}>⬜</span>}
        {!isCancelled && (
          <div style={{display:"flex",gap:2,alignItems:"center"}}>
            {isMedical && <span style={{fontSize:9,lineHeight:1}}>🔵</span>}
            {isIntensive && <span style={{fontSize:9,lineHeight:1}}>🏥</span>}
          </div>
        )}
      </div>
      {!isCancelled && <>
        <div style={{fontSize:10,color:loc.color,fontWeight:800,lineHeight:1.3,marginBottom:1}}>{data.label}</div>
        {data.isIntensive && <div style={{fontSize:8,color:"#7C3AED",fontWeight:700,marginTop:1}}>🏥 CIT during shift</div>}
        {data.isTherapy && !data.isIntensive && <div style={{fontSize:8,color:"#7C3AED",fontWeight:600,marginTop:1}}>therapy {data.therapyTime}</div>}
        {nurse
          ? <div style={{fontSize:9,color:"#065F46",fontWeight:700,marginTop:2,background:"#D1FAE5",borderRadius:4,padding:"2px 5px",display:"inline-block",maxWidth:"100%",overflow:"hidden",whiteSpace:"nowrap",textOverflow:"ellipsis",border:"1px solid #6EE7B7"}}>✓ {nurse}</div>
          : <div style={{fontSize:9,color:"#92400E",fontWeight:800,marginTop:2,background:"#FEF3C7",borderRadius:4,padding:"2px 5px",display:"inline-block",border:"1px solid #FCD34D"}}>⚠ OPEN</div>
        }
        {!nurse && isMedical && <div style={{fontSize:8,color:"#2563EB",marginTop:2,lineHeight:1.2}}>{data.note}</div>}
      </>}
      {isCancelled && <>
        <div style={{fontSize:9,color:"#9CA3AF",fontWeight:600}}>No shift</div>
        <div style={{fontSize:8,color:"#9CA3AF",marginTop:2}}>{data.note}</div>
      </>}
    </div>
  );
}

function Detail({d,y,m,confirmed,onClose,onSave,onRemove}){
  const data=getDayData(y,m,d,confirmed);
  if(!data) return null;
  const loc=LOCATIONS[data.loc];
  const ds=data.ds;
  const dateLabel=new Date(y,m,d).toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric"});
  const med=MEDICAL_APPTS[ds];
  const isPortland=inRange(ds,ALL_PORTLAND_BLOCKS);

  const [edit,setEdit]=useState(false);
  const [pick,setPick]=useState(data.nurse||"");
  const [custom,setCustom]=useState("");

  const doSave=()=>{
    const v=pick==="Other"?custom.trim():pick;
    if(v){onSave(ds,v);setEdit(false);}
  };

  if(data.isCancelled) return (
    <div style={{background:"#F9FAFB",border:"1.5px solid #E5E7EB",borderRadius:16,padding:20,marginTop:14,position:"relative"}}>
      <button onClick={onClose} style={{position:"absolute",top:10,right:12,background:"none",border:"none",cursor:"pointer",fontSize:18,color:"#9CA3AF"}}>×</button>
      <div style={{fontSize:12,fontWeight:700,color:"#9CA3AF",marginBottom:4}}>{dateLabel}</div>
      <div style={{fontSize:15,fontWeight:700,color:"#6B7280"}}>⬜ No nursing shift needed</div>
      <div style={{fontSize:13,color:"#9CA3AF",marginTop:4}}>{data.note}</div>
    </div>
  );

  return (
    <div style={{background:"#fff",border:`2px solid ${loc.color}`,borderRadius:16,padding:22,marginTop:14,position:"relative",boxShadow:`0 4px 24px ${loc.color}15`}}>
      <button onClick={onClose} style={{position:"absolute",top:10,right:12,background:"none",border:"none",cursor:"pointer",fontSize:18,color:"#9CA3AF"}}>×</button>
      <div style={{fontSize:10,fontWeight:700,color:loc.color,letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:4}}>{dateLabel}</div>

      <div style={{display:"flex",gap:10,flexWrap:"wrap",marginBottom:14}}>
        <div style={{background:loc.light,borderRadius:10,padding:"9px 14px"}}>
          <div style={{fontSize:10,color:"#6B7280",fontWeight:600,textTransform:"uppercase",letterSpacing:"0.05em"}}>Location</div>
          <div style={{fontSize:13,fontWeight:700,color:loc.color,marginTop:2}}>{loc.icon} {loc.label}</div>
        </div>
        <div style={{background:"#F9FAFB",borderRadius:10,padding:"9px 14px"}}>
          <div style={{fontSize:10,color:"#6B7280",fontWeight:600,textTransform:"uppercase",letterSpacing:"0.05em"}}>Hours</div>
          <div style={{fontSize:13,fontWeight:700,color:"#374151",marginTop:2}}>{data.label}</div>
        </div>
        {data.isIntensive && <div style={{background:"#F5F3FF",borderRadius:10,padding:"9px 14px"}}>
          <div style={{fontSize:10,color:"#6B7280",fontWeight:600,textTransform:"uppercase",letterSpacing:"0.05em"}}>Service During Shift</div>
          <div style={{fontSize:13,fontWeight:700,color:"#7C3AED",marginTop:2}}>🏥 CIT Intensive Therapy</div>
        </div>}
      </div>

      {!edit ? (
        <div style={{background:data.nurse?"#ECFDF5":"#FFF7ED",border:`1px solid ${data.nurse?"#10B98140":"#F59E0B40"}`,borderRadius:10,padding:"12px 14px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div>
            <div style={{fontSize:10,fontWeight:700,color:data.nurse?"#059669":"#D97706",textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:3}}>
              {data.nurse?"✓ Confirmed":"⚠ Needs Coverage"}
            </div>
            <div style={{fontSize:14,fontWeight:600,color:data.nurse?"#065F46":"#92400E"}}>
              {data.nurse||"No nurse assigned"}
            </div>
          </div>
          <div style={{display:"flex",gap:6}}>
            <button onClick={()=>{setPick(data.nurse||"");setEdit(true);}} style={{background:"#F3F4F6",border:"none",borderRadius:8,padding:"6px 12px",fontSize:12,fontWeight:600,cursor:"pointer",color:"#374151"}}>
              {data.nurse?"Edit":"+ Assign"}
            </button>
            {data.nurse && <button onClick={()=>onRemove(ds)} style={{background:"#FEE2E2",border:"none",borderRadius:8,padding:"6px 10px",fontSize:12,fontWeight:600,cursor:"pointer",color:"#DC2626"}}>✕</button>}
          </div>
        </div>
      ) : (
        <div style={{background:"#F8FAFB",border:"1.5px solid #E5E7EB",borderRadius:10,padding:"12px 14px"}}>
          <div style={{fontSize:11,fontWeight:700,color:"#374151",marginBottom:8,textTransform:"uppercase",letterSpacing:"0.05em"}}>Assign Nurse</div>
          <div style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"center"}}>
            <select value={pick} onChange={e=>setPick(e.target.value)} style={{border:"1.5px solid #D1D5DB",borderRadius:8,padding:"7px 10px",fontSize:13,background:"#fff",color:"#374151",flex:1,minWidth:160}}>
              <option value="">Select...</option>
              {NURSES.map(n=><option key={n} value={n}>{n}</option>)}
            </select>
            {pick==="Other" && <input value={custom} onChange={e=>setCustom(e.target.value)} placeholder="Initials + agency" style={{border:"1.5px solid #D1D5DB",borderRadius:8,padding:"7px 10px",fontSize:13,flex:1,minWidth:150}}/>}
            <button onClick={doSave} style={{background:"#1A7A6E",color:"#fff",border:"none",borderRadius:8,padding:"7px 16px",fontSize:13,fontWeight:700,cursor:"pointer"}}>Save</button>
            <button onClick={()=>setEdit(false)} style={{background:"#F3F4F6",border:"none",borderRadius:8,padding:"7px 12px",fontSize:13,cursor:"pointer",color:"#6B7280"}}>Cancel</button>
          </div>
        </div>
      )}

      {(data.loc==="papas"||data.loc==="cit") && (
        <div style={{marginTop:10,fontSize:11,color:"#6B7280"}}>
          📍 <strong>WA &amp; OR license required</strong>
          {isPortland && <span style={{display:"block",marginTop:3,color:"#DC2626",fontWeight:700}}>⚠️ Parents out of country Aug 2–20 — critical coverage</span>}
        </div>
      )}

      {med && (
        <div style={{marginTop:10,background:"#EFF6FF",border:"1px solid #93C5FD",borderRadius:10,padding:"10px 14px"}}>
          <div style={{fontSize:10,fontWeight:700,color:"#2563EB",textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:4}}>🔵 Medical Appointment</div>
          <div style={{fontSize:13,fontWeight:600,color:"#1E3A8A"}}>{med.appt} — {med.apptTime}</div>
          <div style={{fontSize:11,color:"#3B82F6",marginTop:2}}>{med.location}</div>
          {!med.noEarlyNurse && <div style={{fontSize:11,color:"#6B7280",marginTop:4}}>Shift starts 1 hr before · minimum 8 hrs</div>}
        </div>
      )}
    </div>
  );
}

function QuickAdd({onAdd}){
  const [date,setDate]=useState("");
  const [nurse,setNurse]=useState("");
  const [custom,setCustom]=useState("");
  const [msg,setMsg]=useState("");

  const go=()=>{
    const v=nurse==="Other"?custom.trim():nurse;
    if(!date||!v){setMsg("Please select a date and nurse.");return;}
    onAdd(date,v);
    setMsg(`✓ ${v} confirmed for ${date}`);
    setDate("");setNurse("");setCustom("");
    setTimeout(()=>setMsg(""),3000);
  };

  return (
    <div style={{background:"#fff",borderRadius:16,padding:"16px 20px",marginBottom:18,border:"1.5px solid #E5E7EB",boxShadow:"0 1px 6px rgba(0,0,0,0.04)"}}>
      <div style={{fontSize:11,fontWeight:700,color:"#374151",textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:12}}>+ Confirm a Shift</div>
      <div style={{display:"flex",gap:10,flexWrap:"wrap",alignItems:"flex-end"}}>
        <div>
          <div style={{fontSize:11,color:"#6B7280",fontWeight:600,marginBottom:4}}>Date</div>
          <input type="date" value={date} onChange={e=>setDate(e.target.value)} style={{border:"1.5px solid #D1D5DB",borderRadius:8,padding:"7px 10px",fontSize:13,color:"#374151",background:"#F9FAFB"}}/>
        </div>
        <div>
          <div style={{fontSize:11,color:"#6B7280",fontWeight:600,marginBottom:4}}>Nurse</div>
          <select value={nurse} onChange={e=>setNurse(e.target.value)} style={{border:"1.5px solid #D1D5DB",borderRadius:8,padding:"7px 10px",fontSize:13,background:"#F9FAFB",color:"#374151",minWidth:160}}>
            <option value="">Select...</option>
            {NURSES.map(n=><option key={n} value={n}>{n}</option>)}
          </select>
        </div>
        {nurse==="Other" && (
          <div>
            <div style={{fontSize:11,color:"#6B7280",fontWeight:600,marginBottom:4}}>Initials + Agency</div>
            <input value={custom} onChange={e=>setCustom(e.target.value)} placeholder="e.g. JD (Avail)" style={{border:"1.5px solid #D1D5DB",borderRadius:8,padding:"7px 10px",fontSize:13,minWidth:160}}/>
          </div>
        )}
        <button onClick={go} style={{background:"linear-gradient(135deg,#1A7A6E,#0F5A8A)",color:"#fff",border:"none",borderRadius:8,padding:"8px 20px",fontSize:13,fontWeight:700,cursor:"pointer",alignSelf:"flex-end"}}>Confirm</button>
      </div>
      {msg && <div style={{marginTop:8,fontSize:12,color:msg.startsWith("✓")?"#059669":"#DC2626",fontWeight:600}}>{msg}</div>}
    </div>
  );
}

function App(){
  const today=new Date();
  const [year,setYear]=useState(today.getFullYear());
  const [month,setMonth]=useState(today.getMonth());
  const [sel,setSel]=useState(null);
  const [confirmed,setConfirmed]=useState(()=>load());

  useEffect(()=>{ save(confirmed); },[confirmed]);

  const addShift=(ds,nurse)=>{ setConfirmed(p=>({...p,[ds]:nurse})); setSel(null); };
  const removeShift=(ds)=>{ setConfirmed(p=>{const n={...p};delete n[ds];return n;}); setSel(null); };

  const prev=()=>{ if(month===0){setYear(y=>y-1);setMonth(11);}else setMonth(m=>m-1); setSel(null); };
  const next=()=>{ if(month===11){setYear(y=>y+1);setMonth(0);}else setMonth(m=>m+1); setSel(null); };

  const cells=buildGrid(year,month);
  const s=stats(year,month,confirmed);

  return (
    <div style={{fontFamily:"'Figtree','Segoe UI',sans-serif",maxWidth:880,margin:"0 auto",padding:20,background:"#F0F4F4",minHeight:"100vh"}}>

      <div style={{background:"linear-gradient(135deg,#1A7A6E 0%,#0F5A8A 100%)",borderRadius:20,padding:"22px 26px",marginBottom:18,color:"#fff",position:"relative",overflow:"hidden"}}>
        <div style={{position:"absolute",top:-20,right:-20,width:140,height:140,borderRadius:"50%",background:"rgba(255,255,255,0.06)"}}/>
        <div style={{fontSize:10,fontWeight:700,letterSpacing:"0.12em",opacity:0.75,marginBottom:5,textTransform:"uppercase"}}>Nursing Schedule Dashboard</div>
        <div style={{fontSize:26,fontWeight:800,letterSpacing:"-0.02em",marginBottom:3}}>Kylee · 2026</div>
        <div style={{fontSize:12,opacity:0.8}}>Avail Home Health &amp; Team Select Home Care</div>
      </div>

      <QuickAdd onAdd={addShift}/>

      <div style={{display:"flex",gap:10,marginBottom:18,flexWrap:"wrap",alignItems:"center"}}>
        <Pill label="Total Shifts" value={s.total} color="#1A7A6E"/>
        <Pill label="Confirmed ✓" value={s.filled} color="#059669"/>
        <Pill label="Needs Coverage" value={s.needs} color="#D97706"/>
        {s.cancelled>0 && <Pill label="No Shift ⬜" value={s.cancelled} color="#9CA3AF"/>}
        <div style={{flex:1,minWidth:80}}/>
        <div style={{display:"flex",alignItems:"center",gap:10,background:"#fff",borderRadius:12,padding:"10px 16px",border:"1.5px solid #E5E7EB"}}>
          <div style={{fontSize:11,color:"#6B7280",fontWeight:600}}>Coverage</div>
          <div style={{width:90,height:8,background:"#F3F4F6",borderRadius:4,overflow:"hidden"}}>
            <div style={{width:`${s.total?Math.round(s.filled/s.total*100):0}%`,height:"100%",background:"linear-gradient(90deg,#059669,#10B981)",borderRadius:4,transition:"width 0.4s"}}/>
          </div>
          <div style={{fontSize:12,fontWeight:700,color:"#374151",fontFamily:"'DM Mono',monospace"}}>{s.total?Math.round(s.filled/s.total*100):0}%</div>
        </div>
      </div>

      <div style={{background:"#fff",borderRadius:20,padding:22,boxShadow:"0 2px 16px rgba(0,0,0,0.06)",border:"1px solid #E5E7EB"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18}}>
          <button onClick={prev} style={{background:"#F3F4F6",border:"none",borderRadius:10,width:36,height:36,cursor:"pointer",fontSize:18}}>‹</button>
          <div style={{textAlign:"center"}}>
            <div style={{fontSize:20,fontWeight:800,color:"#111",letterSpacing:"-0.02em"}}>{MONTHS[month]}</div>
            <div style={{fontSize:12,color:"#6B7280",fontFamily:"'DM Mono',monospace"}}>{year}</div>
          </div>
          <button onClick={next} style={{background:"#F3F4F6",border:"none",borderRadius:10,width:36,height:36,cursor:"pointer",fontSize:18}}>›</button>
        </div>

        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:5,marginBottom:5}}>
          {DAYS.map(d=><div key={d} style={{textAlign:"center",fontSize:10,fontWeight:700,color:"#9CA3AF",letterSpacing:"0.06em",textTransform:"uppercase",padding:"3px 0"}}>{d}</div>)}
        </div>

        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:5}}>
          {cells.map((d,i)=>(
            <DayCell key={i} d={d} y={year} m={month} confirmed={confirmed}
              selected={sel===d} onClick={d=>setSel(p=>p===d?null:d)}/>
          ))}
        </div>

        {sel && <Detail d={sel} y={year} m={month} confirmed={confirmed}
          onClose={()=>setSel(null)} onSave={addShift} onRemove={removeShift}/>}
      </div>

      <div style={{display:"flex",gap:8,marginTop:14,flexWrap:"wrap"}}>
        {Object.entries(LOCATIONS).filter(([k])=>k!=="none"&&k!=="cit").map(([k,v])=>(
          <div key={k} style={{display:"flex",alignItems:"center",gap:5,background:"#fff",borderRadius:8,padding:"5px 11px",border:`1.5px solid ${v.color}40`,fontSize:11}}>
            <div style={{width:8,height:8,borderRadius:2,background:v.color}}/>
            <span style={{color:"#374151",fontWeight:500}}>{v.icon} {v.label}</span>
          </div>
        ))}
        <div style={{display:"flex",alignItems:"center",gap:5,background:"#fff",borderRadius:8,padding:"5px 11px",border:"1.5px solid #7C3AED40",fontSize:11}}>
          <span style={{fontSize:10}}>🏥</span><span style={{color:"#374151",fontWeight:500}}>CIT / Therapy noted</span>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:5,background:"#fff",borderRadius:8,padding:"5px 11px",border:"1.5px solid #93C5FD",fontSize:11}}>
          <span style={{color:"#2563EB",fontWeight:700}}>🔵</span><span style={{color:"#374151",fontWeight:500}}>Medical appt</span>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:5,background:"#fff",borderRadius:8,padding:"5px 11px",border:"1.5px solid #05996940",fontSize:11}}>
          <div style={{width:5,height:16,background:"#059669",borderRadius:2}}/>
          <span style={{color:"#374151",fontWeight:500}}>Confirmed</span>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:5,background:"#fff",borderRadius:8,padding:"5px 11px",border:"1.5px solid #F59E0B40",fontSize:11}}>
          <div style={{width:5,height:16,background:"#F59E0B",borderRadius:2}}/>
          <span style={{color:"#374151",fontWeight:500}}>Needs coverage</span>
        </div>
      </div>

      <div style={{marginTop:12,fontSize:10,color:"#9CA3AF",textAlign:"center"}}>
        Confirmed shifts save automatically · jillyb4.github.io/kylee-care
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
